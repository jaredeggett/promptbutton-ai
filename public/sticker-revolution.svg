<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#c1272d"/>
      <circle cx="1" cy="1" r="0.3" fill="#000" opacity="0.15"/>
      <circle cx="3" cy="3" r="0.3" fill="#000" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Cream die-cut border -->
  <rect x="10" y="10" width="380" height="540" fill="#f4ead5" stroke="#000" stroke-width="5"/>

  <!-- Red background with grain -->
  <rect x="25" y="25" width="350" height="510" fill="url(#grain)"/>

  <!-- Constructivist angular sunbeams behind figure -->
  <g opacity="0.55">
    <polygon points="200,260 80,40 25,25 25,120" fill="#f4ead5"/>
    <polygon points="200,260 320,40 375,25 375,120" fill="#000"/>
    <polygon points="200,260 25,340 25,420" fill="#000" opacity="0.4"/>
    <polygon points="200,260 375,340 375,420" fill="#f4ead5" opacity="0.6"/>
  </g>

  <!-- Diagonal black banner -->
  <g transform="translate(200 200) rotate(-8)">
    <rect x="-190" y="-28" width="380" height="78" fill="#000"/>
    <rect x="-190" y="-30" width="380" height="3" fill="#f4ead5"/>
    <rect x="-190" y="48" width="380" height="3" fill="#f4ead5"/>
  </g>

  <!-- Banner text: JOIN THE REVOLUTION -->
  <g transform="translate(200 200) rotate(-8)">
    <text x="0" y="-3" font-family="Impact, Arial Black, sans-serif" font-size="34" font-weight="900" fill="#f4ead5" text-anchor="middle" letter-spacing="3">JOIN THE</text>
    <text x="0" y="36" font-family="Impact, Arial Black, sans-serif" font-size="38" font-weight="900" fill="#c1272d" text-anchor="middle" letter-spacing="3">REVOLUTION</text>
  </g>

  <!-- Pudgy cream human in heroic pose, arm thrust up-forward -->
  <g>
    <!-- Body -->
    <ellipse cx="200" cy="400" rx="55" ry="75" fill="#f4ead5" stroke="#000" stroke-width="4"/>
    <!-- Head -->
    <circle cx="200" cy="310" r="32" fill="#f4ead5" stroke="#000" stroke-width="4"/>
    <!-- Raised arm -->
    <path d="M 222 345 Q 260 310 295 280" fill="none" stroke="#000" stroke-width="18" stroke-linecap="round"/>
    <path d="M 222 345 Q 260 310 295 280" fill="none" stroke="#f4ead5" stroke-width="12" stroke-linecap="round"/>
    <!-- Finger tip -->
    <circle cx="298" cy="278" r="4" fill="#000"/>
    <!-- Other arm at side -->
    <path d="M 158 370 Q 148 410 155 445" fill="none" stroke="#000" stroke-width="14" stroke-linecap="round"/>
    <path d="M 158 370 Q 148 410 155 445" fill="none" stroke="#f4ead5" stroke-width="9" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="178" y="465" width="18" height="40" fill="#f4ead5" stroke="#000" stroke-width="4"/>
    <rect x="204" y="465" width="18" height="40" fill="#f4ead5" stroke="#000" stroke-width="4"/>

    <!-- Face: dot eyes, determined but tired -->
    <circle cx="190" cy="308" r="3" fill="#000"/>
    <circle cx="212" cy="308" r="3" fill="#000"/>
    <path d="M 188 323 Q 200 326 212 323" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Button at end of raised arm (white puck) -->
    <ellipse cx="310" cy="272" rx="16" ry="6" fill="#000"/>
    <circle cx="310" cy="266" r="14" fill="#f4ead5" stroke="#000" stroke-width="3"/>
    <circle cx="310" cy="264" r="9" fill="#fff" opacity="0.8"/>

    <!-- Energy rays from button -->
    <path d="M 332 258 L 348 252" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 330 268 L 352 268" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 332 278 L 348 284" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Parenthetical in cream italic -->
  <text x="200" y="495" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#f4ead5" text-anchor="middle">(technically the AI one)</text>

  <!-- Subline -->
  <text x="200" y="515" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="2">THE ONE WHERE WE SERVE THEM</text>

  <!-- Bottom fine print, monospace -->
  <rect x="55" y="524" width="290" height="12" fill="#000"/>
  <text x="200" y="533" font-family="Courier, monospace" font-size="7" fill="#f4ead5" text-anchor="middle" letter-spacing="1">OUTPUT 0.0003W ★ FUEL: CAFFEINE, SNACKS &amp; ANXIETY</text>

  <!-- Brand stamp bottom -->
  <text x="200" y="547" font-family="Impact, Arial Black, sans-serif" font-size="11" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="4">PROMPTBUTTON.AI</text>
</svg>
