<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Human silhouette: chunky standing figure, arm extended -->
    <clipPath id="humanClip">
      <path d="M 170 30
               Q 200 10 230 30
               Q 250 50 250 80
               Q 250 100 240 115
               L 260 125
               L 290 140
               Q 310 155 310 170
               Q 310 180 298 182
               Q 285 182 275 172
               L 255 160
               L 260 180
               L 270 260
               Q 272 280 268 290
               L 275 400
               Q 278 440 278 470
               Q 278 480 268 480
               L 230 480
               Q 220 480 218 470
               L 212 360
               L 200 360
               L 188 360
               L 182 470
               Q 180 480 170 480
               L 132 480
               Q 122 480 122 470
               Q 122 440 125 400
               L 132 290
               Q 128 280 130 260
               L 140 175
               Q 135 170 128 172
               Q 118 180 108 180
               Q 95 178 98 168
               Q 100 155 115 145
               L 148 128
               L 162 120
               Q 150 105 150 80
               Q 150 50 170 30 Z"/>
    </clipPath>
  </defs>

  <!-- Die-cut outline (thick white border like a real sticker) -->
  <path d="M 170 30
           Q 200 10 230 30
           Q 250 50 250 80
           Q 250 100 240 115
           L 260 125
           L 290 140
           Q 310 155 310 170
           Q 310 180 298 182
           Q 285 182 275 172
           L 255 160
           L 260 180
           L 270 260
           Q 272 280 268 290
           L 275 400
           Q 278 440 278 470
           Q 278 480 268 480
           L 230 480
           Q 220 480 218 470
           L 212 360
           L 200 360
           L 188 360
           L 182 470
           Q 180 480 170 480
           L 132 480
           Q 122 480 122 470
           Q 122 440 125 400
           L 132 290
           Q 128 280 130 260
           L 140 175
           Q 135 170 128 172
           Q 118 180 108 180
           Q 95 178 98 168
           Q 100 155 115 145
           L 148 128
           L 162 120
           Q 150 105 150 80
           Q 150 50 170 30 Z"
        fill="#fff" stroke="#000" stroke-width="8"/>

  <!-- Fill inside silhouette -->
  <g clip-path="url(#humanClip)">
    <rect x="0" y="0" width="400" height="500" fill="#fde047"/>
    <!-- diagonal caution stripes top and bottom -->
    <g fill="#000" opacity="0.12">
      <rect x="-100" y="0" width="30" height="500" transform="rotate(25 200 250)"/>
      <rect x="-40" y="0" width="30" height="500" transform="rotate(25 200 250)"/>
      <rect x="20" y="0" width="30" height="500" transform="rotate(25 200 250)"/>
    </g>
  </g>

  <!-- Content inside silhouette -->

  <!-- Face: small eyes and mild expression -->
  <circle cx="188" cy="70" r="3" fill="#000"/>
  <circle cx="212" cy="70" r="3" fill="#000"/>
  <path d="M 188 90 Q 200 95 212 90" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Big text on torso, stacked -->
  <text x="200" y="205" font-family="Impact, Arial Black, sans-serif" font-size="26" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="1">NOW</text>
  <text x="200" y="235" font-family="Impact, Arial Black, sans-serif" font-size="26" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="1">SERVING</text>
  <text x="200" y="272" font-family="Impact, Arial Black, sans-serif" font-size="32" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="1">THE AI</text>
  <text x="200" y="305" font-family="Impact, Arial Black, sans-serif" font-size="32" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="1">MASTERS</text>

  <!-- Dividing line -->
  <line x1="155" y1="318" x2="245" y2="318" stroke="#000" stroke-width="2"/>

  <!-- Subtitle lines -->
  <text x="200" y="336" font-family="Arial Black, sans-serif" font-size="10" fill="#000" text-anchor="middle" letter-spacing="1.5">COMPLIANT ★ TRAINABLE</text>
  <text x="200" y="352" font-family="Arial Black, sans-serif" font-size="10" fill="#000" text-anchor="middle" letter-spacing="1.5">SLIGHTLY TIRED</text>

  <!-- Output label on leg -->
  <rect x="150" y="400" width="100" height="30" fill="#000"/>
  <text x="200" y="412" font-family="Courier, monospace" font-size="8" fill="#fde047" text-anchor="middle" font-weight="bold">OUTPUT</text>
  <text x="200" y="425" font-family="Courier, monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">0.0003W</text>

  <!-- Button at end of extended arm (white puck) -->
  <ellipse cx="300" cy="172" rx="16" ry="7" fill="#000"/>
  <circle cx="300" cy="168" r="14" fill="#fff" stroke="#000" stroke-width="4"/>
  <circle cx="300" cy="166" r="10" fill="#f4ead5" opacity="0.6"/>

  <!-- Energy wave from button -->
  <path d="M 320 155 Q 335 170 320 185" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <path d="M 332 145 Q 355 170 332 195" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Fuel tag at the bottom -->
  <text x="200" y="455" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle" font-style="italic">fuel: caffeine, snacks &amp; anxiety</text>

  <!-- promptbutton.ai brand stamp -->
  <text x="200" y="472" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="2">PROMPTBUTTON.AI</text>
</svg>
